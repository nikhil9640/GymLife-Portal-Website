<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymLife | Book Consultation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .contact-box { 
            max-width: 600px; 
            margin: 60px auto; 
            padding: 40px; 
            background: var(--bg-surface); 
            border: 1px solid var(--border-tint); 
            border-radius: 24px; 
        }
        .form-group { 
            margin-bottom: 25px; 
        }
        .form-group label { 
            display: block; 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: var(--text-pure); 
        }
        .form-group input, .form-group textarea { 
            width: 100%; 
            background: var(--bg-base); 
            border: 1px solid var(--border-tint); 
            padding: 14px; 
            border-radius: 10px; 
            color: #fff; 
            font-family: var(--font-body); 
        }
        .form-group input:focus { 
            border-color: var(--accent-blue); 
            outline: none; 
        }
        .submit-btn { 
            width: 100%; 
            background: var(--accent-blue); 
            border: none; 
            padding: 16px; 
            border-radius: 50px; 
            font-weight: 700; 
            font-family: var(--font-heading); 
            cursor: pointer; 
            text-transform: uppercase; 
        }
    </style>
</head>
<body>

    <header class="global-header">
        <div class="logo"><a href="../index.html"><i class="fa-solid fa-dumbbell"></i> GYM<span>M</span></a></div>
        <button class="menu-toggle" id="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
        <nav id="navbar" class="main-navigation">
            <ul class="nav-menu-list">
                <li><a href="../index.html" class="nav-route">Home</a></li>
                <li><a href="About us.html" class="nav-route">About Us</a></li>
                <li><a href="services.html" class="nav-route">Services</a></li>
                <li><a href="timetable.html" class="nav-route">Classes</a></li>
                <li><a href="contact.html" class="nav-route active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero-banner">
        <h1>Schedule Appointment</h1>
        <div class="breadcrumbs"><a href="../index.html">Home</a><span class="breadcrumb-separator">&#8250;</span><span class="current-page">Contact Us</span></div>
    </section>

    <main class="contact-box">
        <form action="#" onsubmit="event.preventDefault(); alert('Consultation Request Submitted successfully.');">
            <div class="form-group">
                <label>Athlete Name</label>
                <input type="text" placeholder="Enter Full Identity" required>
            </div>
            <div class="form-group">
                <label>Email ID Channel</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Targets Profile Outlines</label>
                <textarea rows="4" placeholder="Describe physical target parameters..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Register Baseline Profile</button>
        </form>
    </main>
</body>
</html>
